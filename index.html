<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=240, height=400, initial-scale=1.0" />
  <meta name="ad.size" content="width=240,height=400" />
  <script type="text/javascript" src="https://ds.serving-sys.ru/BurstingScript/EBLoader.js"></script>
  <title>HTML5 Banner</title>
  <style>
    html, body {
      margin: 0;
      width: 240px;
      height: 400px;
      overflow: hidden;
      background: #000;
    }

    .banner {
      display: block;
      position: relative;
      width: 240px;
      height: 400px;
      overflow: hidden;
      background: #000;
      cursor: pointer;
    }

    .layer {
      position: absolute;
      display: block;
      user-select: none;
      -webkit-user-drag: none;
      pointer-events: none;
    }

    .bg {
      left: 0;
      top: 0;
      width: 240px;
      height: 400px;
    }

    .bottom-fade {
      left: 0;
      bottom: 0;
      width: 240px;
      height: 172px;
      z-index: 1;
      background: linear-gradient(180deg, rgba(0, 0, 0, 0) 0%, rgba(0, 0, 0, .24) 40%, rgba(0, 0, 0, .72) 100%);
    }

    .corner-logo {
      right: 16px;
      bottom: 32.5px;
      width: 62px;
      height: 46px;
      z-index: 3;
      opacity: 1;
      will-change: opacity;
      animation: cornerLogoFade .35s ease-out 1.05s forwards;
    }

    .boss {
      left: -198px;
      top: -36px;
      width: 396px;
      height: 660px;
      transform: translate3d(0, 0, 0) scale3d(1, 1, 1);
      transform-origin: center;
      will-change: transform;
      backface-visibility: hidden;
      animation: bossAnim 9.6s cubic-bezier(.22, .61, .36, 1) forwards;
    }

    .leopard {
      left: 15px;
      top: 77px;
      width: 225px;
      height: 585px;
      opacity: 1;
      transform: translate3d(0, 0, 0) scale3d(1, 1, 1);
      transform-origin: center;
      will-change: transform;
      backface-visibility: hidden;
      animation: leopardAnim 9.6s cubic-bezier(.22, .61, .36, 1) forwards;
    }

    .offer-card,
    .bottom-panel-glow,
    .cta-button,
    .disclaimer {
      position: absolute;
      z-index: 5;
      box-sizing: border-box;
      font-family: Arial, Helvetica, sans-serif;
      color: #fff;
    }

    .bottom-panel-glow {
      left: 0;
      bottom: 0;
      width: 240px;
      height: 108px;
      background: linear-gradient(180deg, rgba(111, 116, 126, 0) 0%, rgba(111, 116, 126, .9) 100%);
      opacity: 0;
      z-index: 2;
      transform: translate3d(0, 42px, 0);
      animation: bottomPanelGlowReveal 1s cubic-bezier(.2, .8, .2, 1) 2s forwards;
    }

    .offer-card {
      left: 50%;
      bottom: 22.5px;
      width: 230px;
      height: 139px;
      margin-left: -115px;
      padding: 10px;
      border-radius: 16px;
      overflow: hidden;
      transform: translate3d(0, 0, 0);
      animation: cardLift 1.2s cubic-bezier(.22, .7, .2, 1) 6s forwards;
    }

    .offer-card::before {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: 16px;
      background: #000;
      box-shadow: 0 16px 40px rgba(0, 0, 0, .22);
      clip-path: inset(100% 0 0 0 round 16px);
      animation: cardReveal 1.15s cubic-bezier(.2, .8, .2, 1) 2s forwards;
    }

    .offer-card-inner {
      position: relative;
      width: 100%;
      height: 100%;
      z-index: 1;
    }

    .offer-title {
      margin: 0;
      width: 207px;
      height: 50px;
      position: relative;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .title-row {
      position: relative;
      left: 0;
      overflow: hidden;
    }

    .title-row.row-1 {
      width: 207px;
      height: 20px;
    }

    .title-row.row-2 {
      width: 199px;
      height: 28px;
    }

    .title-face {
      position: absolute;
      inset: 0;
      display: block;
    }

    .title-face img {
      position: absolute;
      left: 0;
      top: 0;
      display: block;
      width: auto;
      pointer-events: none;
      user-select: none;
      -webkit-user-drag: none;
    }

    .title-row.row-1 .title-face img {
      height: 18px;
    }

    .title-row.row-1 .title-face.next img {
      width: 198px;
      height: 21px;
    }

    .title-row.row-2 .title-face.current img {
      height: 21px;
      top: 5px;
    }

    .title-row.row-2 .title-face.next img {
      width: 198px;
      height: 27px;
    }

    .title-face.current {
      opacity: 0;
      transform: translate3d(0, 100%, 0);
      animation:
        titleCurrentEnter 1.28s cubic-bezier(.22, .61, .36, 1) forwards,
        titleCurrentFlip 1.12s cubic-bezier(.22, .61, .36, 1) forwards;
    }

    .title-face.next {
      opacity: 0;
      transform: translate3d(0, 100%, 0);
      animation: titleNextFlip 1.12s cubic-bezier(.22, .61, .36, 1) forwards;
    }

    .title-row.row-1 .title-face.current {
      animation-delay: 2.55s, 6s;
    }

    .title-row.row-2 .title-face.current {
      animation-delay: 2.67s, 6s;
    }

    .title-row.row-1 .title-face.next {
      animation-delay: 6s;
    }

    .title-row.row-2 .title-face.next {
      animation-delay: 6s;
    }

    .offer-bottom {
      position: absolute;
      right: 0px;
      bottom: 0px;
      display: flex;
      align-items: flex-end;
      justify-content: flex-end;
    }

    .t2-logo {
      display: block;
      width: 63.23px;
      height: 46.56px;
      min-width: 63.23px;
      max-width: 63.23px;
      min-height: 46.56px;
      max-height: 46.56px;
      flex: 0 0 63.23px;
      align-self: flex-end;
      opacity: 0;
      transform: translate3d(0, 22px, 0) scale(.92);
      transform-origin: 50% 100%;
      animation: logoReveal .82s cubic-bezier(.2, .8, .2, 1) 2.84s forwards;
    }

    .t2-logo:not([src]),
    .final-screen-logo:not([src]) {
      visibility: hidden;
    }

    .cta-button {
      left: 50%;
      bottom: 22.5px;
      width: 230px;
      height: 40px;
      margin-left: -115px;
      border: 0;
      border-radius: 100px;
      overflow: hidden;
      transform: translate3d(0, 0, 0);
    }

    .cta-button::before {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: 100px;
      background: #ff3495;
      clip-path: inset(100% 0 0 0 round 100px);
      animation: buttonReveal 1.1s cubic-bezier(.22, .7, .2, 1) 6s forwards;
    }

    .cta-button-content {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      clip-path: inset(100% 0 0 0 round 100px);
      animation: buttonReveal 1.1s cubic-bezier(.22, .7, .2, 1) 6s forwards;
    }

    .cta-button img {
      display: block;
      width: 136px;
      height: 16px;
      padding-top: 2px;
    }

    .disclaimer {
      left: 50%;
      bottom: 9px;
      z-index: 6;
      width: 100%;
      font-weight: 400;
      font-size: 6.4px;
      line-height: 1.1;
      color: #fff;
      text-align: center;
      transform: translateX(-50%);
    }

    .final-fade {
      inset: 0;
      z-index: 10;
      background: #000;
      opacity: 0;
      animation: finalFade .55s ease-out 9s forwards;
    }

    .final-screen {
      inset: 0;
      z-index: 11;
      opacity: 0;
      animation: finalScreenReveal .7s ease-out 9.6s forwards;
    }

    .final-screen-logo {
      left: 50%;
      top: 150px;
      width: 108.65px;
      height: 80px;
      min-width: 108.65px;
      max-width: 108.65px;
      min-height: 80px;
      max-height: 80px;
      transform: translate3d(-50%, 18px, 0);
      opacity: 0;
      animation: finalScreenLogo .75s cubic-bezier(.22, .72, .2, 1) 9.6s forwards;
    }

    .final-screen-copy {
      left: 50%;
      bottom: 28px;
      width: 206px;
      transform: translateX(-50%);
      font-family: Arial, Helvetica, sans-serif;
      font-size: 8px;
      line-height: 1.12;
      font-weight: 400;
      text-align: center;
      color: #fff;
      opacity: 0;
      animation: finalScreenText .75s ease-out 10.3s forwards;
    }

    @keyframes leopardAnim {
      0% {
        transform: translate3d(0, 0, 0) scale3d(1, 1, 1);
        animation-timing-function: cubic-bezier(.22, .12, .38, 1);
      }
      10.4% {
        transform: translate3d(3px, -8px, 0) scale3d(.973, .973, 1);
        animation-timing-function: cubic-bezier(.16, .68, .16, 1);
      }
      100% {
        transform: translate3d(50px, -130px, 0) scale3d(.55, .55, 1);
      }
    }

    @keyframes bossAnim {
      0% {
        transform: translate3d(0, 0, 0) scale3d(1, 1, 1);
        animation-timing-function: cubic-bezier(.22, .12, .38, 1);
      }
      10.4% {
        transform: translate3d(7px, -5px, 0) scale3d(.978, .978, 1);
        animation-timing-function: cubic-bezier(.16, .68, .16, 1);
      }
      100% {
        transform: translate3d(120px, -85px, 0) scale3d(.6333, .6333, 1);
      }
    }

    @keyframes cardReveal {
      from {
        clip-path: inset(100% 0 0 0 round 16px);
      }
      to {
        clip-path: inset(0 0 0 0 round 16px);
      }
    }

    @keyframes cardLift {
      from {
        transform: translate3d(0, 0, 0);
      }
      to {
        transform: translate3d(0, -44px, 0);
      }
    }

    @keyframes bottomPanelGlowReveal {
      from {
        transform: translate3d(0, 42px, 0);
        opacity: 0;
      }
      to {
        transform: translate3d(0, 0, 0);
        opacity: 1;
      }
    }

    @keyframes buttonReveal {
      from {
        clip-path: inset(100% 0 0 0 round 100px);
      }
      to {
        clip-path: inset(0 0 0 0 round 100px);
      }
    }

    @keyframes logoReveal {
      from {
        transform: translate3d(0, 22px, 0) scale(.92);
        opacity: 0;
      }
      to {
        transform: translate3d(0, 0, 0) scale(1);
        opacity: 1;
      }
    }

    @keyframes titleCurrentEnter {
      0% {
        transform: translate3d(0, 100%, 0);
        opacity: 0;
      }
      100% {
        transform: translate3d(0, 0, 0);
        opacity: 1;
      }
    }

    @keyframes titleCurrentFlip {
      0% {
        transform: translate3d(0, 0, 0);
        opacity: 1;
      }
      100% {
        transform: translate3d(0, -115%, 0);
        opacity: 0;
      }
    }

    @keyframes titleNextFlip {
      0% {
        transform: translate3d(0, 100%, 0);
        opacity: 0;
      }
      100% {
        transform: translate3d(0, 0, 0);
        opacity: 1;
      }
    }

    @keyframes cornerLogoFade {
      from {
        opacity: 1;
      }
      to {
        opacity: 0;
      }
    }

    @keyframes finalFade {
      from {
        opacity: 0;
      }
      to {
        opacity: 1;
      }
    }

    @keyframes finalScreenReveal {
      from {
        opacity: 0;
      }
      to {
        opacity: 1;
      }
    }

    @keyframes finalScreenLogo {
      from {
        transform: translate3d(-50%, 18px, 0);
        opacity: 0;
      }
      to {
        transform: translate3d(-50%, 0, 0);
        opacity: 1;
      }
    }

    @keyframes finalScreenText {
      from {
        transform: translate3d(-50%, 10px, 0);
        opacity: 0;
      }
      to {
        transform: translate3d(-50%, 0, 0);
        opacity: .7;
      }
    }
  </style>
</head>
<body>
  <a class="banner" id="button1" href="%banner.reference_mrc_user1%" target="%banner.target%" aria-label="banner">
    <img class="layer bg" src="bg.png" alt="" />
    <img class="layer boss" src="boss.png" alt="" />
    <img class="layer leopard" src="leopard.png" alt="" />
    <img class="layer corner-logo" src="logo.png" alt="" aria-hidden="true" />
    <div class="layer bottom-fade" aria-hidden="true"></div>
    <div class="bottom-panel-glow" aria-hidden="true"></div>
    <div class="offer-card">
      <div class="offer-card-inner">
        <div class="offer-title" aria-label="headline animation">
          <span class="title-row row-1">
            <span class="title-face current">
              <img src="headline-current-top-ru.svg" alt="" aria-hidden="true" />
            </span>
            <span class="title-face next">
              <img src="headline-next-top-ru.svg" alt="" aria-hidden="true" />
            </span>
          </span>
          <span class="title-row row-2">
            <span class="title-face current is-friends-t2">
              <img src="headline-current-bottom-ru.svg" alt="" aria-hidden="true" />
            </span>
            <span class="title-face next">
              <img src="headline-next-bottom-ru.svg" alt="" aria-hidden="true" />
            </span>
          </span>
        </div>
        <div class="offer-bottom">
            <img class="t2-logo" data-gif-src="logotype.gif" data-gif-delay="2840" alt="" aria-hidden="true" />
        </div>
      </div>
    </div>
    <div class="cta-button">
      <span class="cta-button-content">
        <img src="cta-more-ru.svg" alt="Подробнее" />
      </span>
    </div>
    <div class="disclaimer">Реклама. Рекламодатель: ООО «Т2 Мобайл», ИНН: 7743895280</div>
    <div class="layer final-fade" aria-hidden="true"></div>
    <div class="layer final-screen" aria-hidden="true">
      <img class="layer final-screen-logo" data-gif-src="logotype.gif" data-gif-delay="9600" alt="" aria-hidden="true" />
      <div class="layer final-screen-copy">Реклама. Рекламодатель: ООО «Т2 Мобайл»,<br /> Россия, 108811, г. Москва, п. Московский, Киевское&nbsp;шоссе, 22-й километр, д. 6, стр. 1, ОГРН: 1137746610088, ИНН: 7743895280, t2.ru | 0+ Подробнее о реферальной программе на t2.ru</div>
    </div>
  </a>

  <script>
    (function () {
      var button = document.getElementById('button1');
      var titleTrigger = document.querySelector('.title-row.row-1 .title-face.current');
      var gifPlayers = document.querySelectorAll('[data-gif-src]');
      var adStarted = false;
      var GIF_START_ADVANCE_MS = 180;

      if (!button) {
        return;
      }

      function getClickTag() {
        if (typeof window.clickTag === 'string' && window.clickTag) return window.clickTag;
        var params = new URLSearchParams(window.location.search);
        return params.get('clickTag') || params.get('clickTAG') || '';
      }

      function hasEB() {
        return Boolean(
          window.EB &&
          window.EBG &&
          window.EBG.EventName &&
          window.EBG.EventName.EB_INITIALIZED &&
          typeof window.EB.isInitialized === 'function' &&
          typeof window.EB.clickthrough === 'function'
        );
      }

      function clickthrough1(event) {
        if (hasEB()) {
          event.preventDefault();
          window.EB.clickthrough();
          return;
        }

        var href = button.getAttribute('href') || '';
        if (!href || href.indexOf('%banner.') === 0) {
          event.preventDefault();
        }
      }

      function startAd() {
        var currentHref;
        var clickTag;

        if (adStarted) {
          return;
        }

        adStarted = true;
        currentHref = button.getAttribute('href') || '';
        clickTag = getClickTag();

        if (clickTag && (!currentHref || currentHref.indexOf('%banner.') === 0)) {
          button.setAttribute('href', clickTag);
          button.setAttribute('target', '_blank');
          button.setAttribute('rel', 'noopener');
        }

        button.addEventListener('click', clickthrough1);
      }

      function startGif(player) {
        var src = player.getAttribute('data-gif-src');
        var separator;

        if (!src || player.getAttribute('data-gif-started') === 'true') {
          return;
        }

        separator = src.indexOf('?') === -1 ? '?' : '&';
        player.setAttribute('src', src + separator + 'play=' + Date.now());
        player.setAttribute('data-gif-started', 'true');
      }

      function getFirstAnimationDelayMs(element) {
        var animationDelay;
        var firstDelay;
        var value;

        if (!element) {
          return null;
        }

        animationDelay = window.getComputedStyle(element).animationDelay || '';
        firstDelay = animationDelay.split(',')[0];

        if (!firstDelay) {
          return null;
        }

        value = firstDelay.trim();

        if (value.slice(-2) === 'ms') {
          return Number(value.slice(0, -2));
        }

        if (value.slice(-1) === 's') {
          return Number(value.slice(0, -1)) * 1000;
        }

        return null;
      }

      function initGifPlayers() {
        var titleStartDelay;

        if (!gifPlayers.length) {
          return;
        }

        titleStartDelay = getFirstAnimationDelayMs(titleTrigger);

        gifPlayers.forEach(function (player) {
          var trigger = player.getAttribute('data-gif-trigger');
          var delay = Number(player.getAttribute('data-gif-delay')) || 0;

          if (trigger === 'title-start') {
            return;
          }

          window.setTimeout(function () {
            startGif(player);
          }, Math.max(delay - GIF_START_ADVANCE_MS, 0));
        });

        if (titleTrigger) {
          if (titleStartDelay !== null) {
            window.setTimeout(function () {
              gifPlayers.forEach(function (player) {
                if (player.getAttribute('data-gif-trigger') === 'title-start') {
                  startGif(player);
                }
              });
            }, Math.max(titleStartDelay - GIF_START_ADVANCE_MS, 0));
          } else {
            titleTrigger.addEventListener('animationstart', function (event) {
              if (event.animationName === 'titleCurrentEnter') {
                gifPlayers.forEach(function (player) {
                  if (player.getAttribute('data-gif-trigger') === 'title-start') {
                    startGif(player);
                  }
                });
              }
            }, { once: true });
          }
        }
      }

      function initEB() {
        initGifPlayers();

        if (hasEB()) {
          if (!window.EB.isInitialized()) {
            window.EB.addEventListener(window.EBG.EventName.EB_INITIALIZED, startAd);
          } else {
            startAd();
          }
          return;
        }

        startAd();
      }

      window.addEventListener('load', initEB);
    })();
  </script>
</body>
</html>
